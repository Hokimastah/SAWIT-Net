# Default SAWIT-Net configuration
image_root: .
dataset_type: csv
image_col: id
label_col: label
image_size: 112
allow_missing_images: false

backbone: resnet50
pretrained: true
emb_size: 512
head: arcface
arc_s: 30.0
arc_m: 0.5

epochs: 5
batch_size: 32
lr: 0.0001
weight_decay: 0.0
optimizer: adam
num_workers: 2
seed: 42
device: auto

memory_limit: 500
min_per_class: 0
kd_weight: 0.30
ms_weight: 0.30
ckd_weight: 0.20
proto_weight: 0.15
ckd_temperature: 2.0

verbose: true
